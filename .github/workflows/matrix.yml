name: matrix build

on: 
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        strategy: 
            matrix:
                pyhton-version: ["3.10","3.11","3.12"]

        steps:
            - name: Code Checkout
              uses: actions/checkout@v4
              
            - name: setup python
              uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.pyhton-version }}