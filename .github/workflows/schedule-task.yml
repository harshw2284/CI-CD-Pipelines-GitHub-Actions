name: Scheduled Tasks

on:
  schedule:
    # Every Monday at 2:30 AM UTC
    - cron: '30 2 * * 1'

    # Every 6 hours
    - cron: '0 */6 * * *'

  # Optional: Allows you to run the workflow manually for testing
  workflow_dispatch:

jobs:
  scheduled-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print the schedule that triggered this workflow
        run: |
          echo "Triggered by schedule: ${{ github.event.schedule }}"

      - name: Health Check
        run: |
          URL="https://example.com"

          STATUS_CODE=$(curl -o /dev/null -s -w "%{http_code}" "$URL")

          echo "Response Code: $STATUS_CODE"

          if [ "$STATUS_CODE" -eq 200 ]; then
            echo "✅ Health check passed."
          else
            echo "❌ Health check failed!"
            exit 1
          fi